# infrastructure/docker-compose.yml
version: '3.9'

services:
  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: notifyx-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - notifyx-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # NestJS API
  # ─────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: development        # Multi-stage: use 'development' stage locally
    container_name: notifyx-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
    volumes:
      - ../apps/api/src:/app/src  # Hot reload: mount source into container
      - ../apps/api/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy  # Wait until Postgres passes health check
      redis:
        condition: service_healthy
    networks:
      - notifyx-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16   # Official pgvector image (includes extension)
    container_name: notifyx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Named volume: data persists across restarts
    ports:
      - "5432:5432"               # Expose for local tools (TablePlus, pgAdmin, etc.)
    networks:
      - notifyx-network
    healthcheck:                  # Docker won't mark postgres "healthy" until this passes
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: notifyx-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    # --requirepass: password protection
    # --appendonly yes: write-ahead log for durability (AOF persistence)
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - notifyx-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # FastAPI AI Worker
  # ─────────────────────────────────────────
  ai-worker:
    build:
      context: ../apps/ai-worker
      dockerfile: Dockerfile
    container_name: notifyx-ai-worker
    env_file:
      - .env
    volumes:
      - ../apps/ai-worker/app:/app/app   # Hot reload for Python
      - ai_models:/app/models            # Cache downloaded ML models
    networks:
      - notifyx-network
    restart: unless-stopped

# ─────────────────────────────────────────
# Named Volumes (data persists across docker-compose down/up)
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  ai_models:

# ─────────────────────────────────────────
# Isolated network (containers talk by service name, not IP)
# ─────────────────────────────────────────
networks:
  notifyx-network:
    driver: bridge