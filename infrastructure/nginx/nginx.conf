# infrastructure/nginx/nginx.conf
events {
    worker_connections 1024;  # Max simultaneous connections per worker
}

http {
    # ─── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Rate limiting (global) ────────────────────────────────
    # Store rate limit state in shared memory zone
    # "10m" = 10MB can store ~160,000 IP addresses
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ─── Upstream: NestJS API ─────────────────────────────────
    upstream notifyx_api {
        server api:3000;  # 'api' resolves via Docker DNS to the NestJS container
        # In production, list multiple server entries for load balancing:
        # server api_1:3000;
        # server api_2:3000;
        keepalive 32;     # Keep connections alive (avoid TCP handshake overhead)
    }

    server {
        listen 80;
        server_name localhost;

        # ─── Security headers ───────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ─── API routes ─────────────────────────────────────────
        location /api/ {
            # Apply rate limiting: burst of 20 requests, no delay
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://notifyx_api;

            # Essential proxy headers (so NestJS knows the real client IP)
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ─── Health check (bypasses rate limit) ─────────────────
        location /health {
            proxy_pass http://notifyx_api;
        }
    }
}